<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Tracker</h1>
            <p class="subtitle">Simple, efficient task management</p>
        </header>

        <div class="task-form-container">
            <form id="taskForm" class="task-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="taskTitle" 
                        placeholder="Add a new task..." 
                        required
                        maxlength="100"
                    >
                </div>

                <div class="form-controls">
                    <div class="form-group">
                        <label for="taskSize">Size:</label>
                        <select id="taskSize">
                            <option value="S">Small (S)</option>
                            <option value="M" selected>Medium (M)</option>
                            <option value="L">Large (L)</option>
                        </select>
                    </div>

                    <div class="form-group toggle-group">
                        <label>Urgency:</label>
                        <button type="button" class="toggle-btn" id="urgencyToggle" data-state="low">
                            <span class="toggle-label">Low</span>
                        </button>
                    </div>

                    <div class="form-group toggle-group">
                        <label>Importance:</label>
                        <button type="button" class="toggle-btn" id="importanceToggle" data-state="low">
                            <span class="toggle-label">Low</span>
                        </button>
                    </div>

                    <button type="submit" class="btn-add">Add Task</button>
                </div>
            </form>
        </div>

        <div class="tasks-container">
            <section class="tasks-section">
                <h2 class="section-title">Todo</h2>
                <div id="todoTasks" class="tasks-list">
                    <!-- Tasks will be rendered here -->
                </div>
            </section>

            <section class="tasks-section">
                <button class="collapsible" id="doneToggle">
                    <span class="toggle-icon">▶</span>
                    Done (<span id="doneCount">0</span>)
                </button>
                <div id="doneTasks" class="tasks-list collapsed">
                    <!-- Completed tasks will be rendered here -->
                </div>
            </section>
        </div>

        <div class="empty-state" id="emptyState">
            <p>No tasks yet. Add one to get started! 🚀</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
