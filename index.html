<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Tracker</h1>
            <p class="subtitle">Simple, efficient task management</p>
        </header>

        <div class="task-form-container">
            <form id="taskForm" class="task-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="taskTitle" 
                        placeholder="Add a new task..." 
                        required
                        maxlength="100"
                    >
                </div>

                <div class="form-controls">
                    <div class="form-group">
                        <label for="taskSize">Size:</label>
                        <select id="taskSize">
                            <option value="S">Small (S)</option>
                            <option value="M" selected>Medium (M)</option>
                            <option value="L">Large (L)</option>
                        </select>
                    </div>

                    <div class="form-group toggle-group">
                        <label>Urgency:</label>
                        <button type="button" class="toggle-btn" id="urgencyToggle" data-state="low">
                            <span class="toggle-label">Low</span>
                        </button>
                    </div>

                    <div class="form-group toggle-group">
                        <label>Importance:</label>
                        <button type="button" class="toggle-btn" id="importanceToggle" data-state="low">
                            <span class="toggle-label">Low</span>
                        </button>
                    </div>

                    <button type="submit" class="btn-add">Add Task</button>
                </div>
            </form>
        </div>

        <div class="empty-state" id="emptyState">
            <p>No tasks yet. Add one to get started! 🚀</p>
        </div>

        <div class="tasks-container">
            <!-- Todo Tasks by Priority -->
            <section class="todo-section">
                <h2 class="main-section-title">📋 Todo</h2>
                
                <!-- Priority 1: High Importance + High Urgency -->
                <div class="priority-section">
                    <h3 class="priority-title priority-1-title">
                        <span class="priority-icon">🔴</span>
                        Critical (High Importance + High Urgency)
                    </h3>
                    <div id="priority1Tasks" class="tasks-list">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>

                <!-- Priority 2: High Importance + Low Urgency -->
                <div class="priority-section">
                    <h3 class="priority-title priority-2-title">
                        <span class="priority-icon">🟠</span>
                        Important (High Importance + Low Urgency)
                    </h3>
                    <div id="priority2Tasks" class="tasks-list">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>

                <!-- Priority 3: Low Importance + High Urgency -->
                <div class="priority-section">
                    <h3 class="priority-title priority-3-title">
                        <span class="priority-icon">🟡</span>
                        Urgent (Low Importance + High Urgency)
                    </h3>
                    <div id="priority3Tasks" class="tasks-list">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>

                <!-- Priority 4: Low Importance + Low Urgency -->
                <div class="priority-section">
                    <h3 class="priority-title priority-4-title">
                        <span class="priority-icon">🟢</span>
                        Backlog (Low Importance + Low Urgency)
                    </h3>
                    <div id="priority4Tasks" class="tasks-list">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>
            </section>

            <!-- Done Section -->
            <section class="done-section">
                <button class="collapsible" id="doneToggle">
                    <span class="toggle-icon">▶</span>
                    ✅ Done (<span id="doneCount">0</span>)
                </button>
                <div id="doneTasks" class="tasks-list collapsed">
                    <!-- Completed tasks will be rendered here -->
                </div>
            </section>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
